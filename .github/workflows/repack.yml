name: Repack Bedrock Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Minecraft Version (e.g., 1.19.0.5)'
        required: true
      url:
        description: 'Download URL for the Appx/MSIXVC'
        required: true
      is_preview:
        description: 'Is this a preview/beta version?'
        required: true
        type: boolean
      is_gdk:
        description: 'Is this a GDK version?'
        required: false
        type: boolean
        default: false

jobs:
  repack:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install 7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Build Repacker
        run: cargo build --release

      - name: Run Repacker
        run: |
          ./target/release/bedrock-repacker repack \
            --url "${{ github.event.inputs.url }}" \
            --output ./artifacts \
            --volume-size 1000m

      - name: Cleanup / Rename Package
        run: |
          IS_GDK="${{ github.event.inputs.is_gdk }}"
          VERSION="${{ github.event.inputs.version }}"
          
          # Check existing assets on the release (if it already exists)
          EXISTING_ASSETS=$(gh release view "v${VERSION}" --json assets -q '.assets[].name' 2>/dev/null || echo "")
          
          if [ "$IS_GDK" == "true" ]; then
            # For GDK: we want BOTH .msixvc (original package) AND bedrock_app.7z (extracted content)
            
            # Step 1: Delete any wrong .Appx assets (incorrectly named msixvc)
            if echo "$EXISTING_ASSETS" | grep -iqE "\.appx$"; then
              echo "GDK release has wrong .Appx assets. Deleting them..."
              for ASSET_NAME in $(gh release view "v${VERSION}" --json assets -q '.assets[].name' 2>/dev/null); do
                if echo "$ASSET_NAME" | grep -iqE "\.appx$"; then
                  echo "Deleting wrong asset: $ASSET_NAME"
                  gh release delete-asset "v${VERSION}" "$ASSET_NAME" --yes 2>/dev/null || true
                fi
              done
              # Refresh existing assets list after deletion
              EXISTING_ASSETS=$(gh release view "v${VERSION}" --json assets -q '.assets[].name' 2>/dev/null || echo "")
            fi
            
            # Step 2: Process the original_package.msixvc
            # Only skip renaming if .msixvc or .msixvc.7z.001 is ALREADY correctly uploaded
            HAS_MSIXVC=$(echo "$EXISTING_ASSETS" | grep -iqE "\.msixvc$|\.msixvc\.7z\.\d+$" && echo "true" || echo "false")
            
            if [ "$HAS_MSIXVC" == "true" ]; then
              echo "MSIXVC already correctly uploaded. Removing local copy to avoid duplicate."
              rm -f ./artifacts/original_package.*
            else
              echo "Processing GDK original package (.msixvc)..."
              for file in ./artifacts/original_package.*; do
                if [ -f "$file" ]; then
                  MSIXVC_PATH="./artifacts/${VERSION}.msixvc"
                  mv "$file" "$MSIXVC_PATH"
                  SIZE=$(stat -c%s "$MSIXVC_PATH")
                  echo "MSIXVC size: $SIZE bytes"
                  if [ $SIZE -ge 2000000000 ]; then
                    echo "MSIXVC is larger than 2GB. Splitting into 7z volumes (1.9GB each)..."
                    7z a -v1900m -mx=0 "${MSIXVC_PATH}.7z" "$MSIXVC_PATH"
                    rm -f "$MSIXVC_PATH"
                    echo "Split complete. Parts:"
                    ls -lh ./artifacts/*.msixvc.7z.* 2>/dev/null || true
                  else
                    echo "MSIXVC fits within 2GB limit, uploading as-is."
                  fi
                fi
              done
            fi
            
            # bedrock_app.7z* is always kept — it was created by the repacker and will be uploaded
            echo "Artifacts to upload:"
            ls -lh ./artifacts/ || true
            
          else
            # For UWP: just rename to .Appx, skip if already exists
            if echo "$EXISTING_ASSETS" | grep -iqE "\.appx$"; then
              echo "UWP release already has .Appx asset. Removing downloaded copy."
              rm -f ./artifacts/original_package.*
            else
              echo "Renaming to .Appx..."
              for file in ./artifacts/original_package.*; do
                if [ -f "$file" ]; then
                  mv "$file" "./artifacts/${VERSION}.Appx"
                fi
              done
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Bedrock ${{ github.event.inputs.version }}
          files: ./artifacts/*
          draft: false
          prerelease: ${{ github.event.inputs.is_preview == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
