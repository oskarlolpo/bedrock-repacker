name: Repack Bedrock Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Name (e.g. 1.26.4020.0)'
        required: true
      url:
        description: 'URL of the .msixvc package'
        required: true
      is_preview:
        description: 'Is Preview/Beta'
        required: false
        default: 'false'

jobs:
  repack:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install 7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Build Repacker
        run: cargo build --release

      - name: Run Repacker
        run: |
          ./target/release/bedrock-repacker repack \
            --url "${{ github.event.inputs.url }}" \
            --output ./artifacts \
            --volume-size 1000m

      - name: Cleanup / Rename Package
        run: |
          HAS_APPX=$(gh release view v${{ github.event.inputs.version }} --json assets -q '.assets[].name' 2>/dev/null || echo "")
          if echo "$HAS_APPX" | grep -iqE "\.appx$|\.msixvc$"; then
            echo "Release already has appx/msixvc. Deleting downloaded copy to prevent duplicates."
            rm -f ./artifacts/original_package.*
          else
            echo "New release or no appx. Renaming to standard name."
            for file in ./artifacts/original_package.*; do
              if [ -f "$file" ]; then
                EXT="${file##*.}"
                if [ "$EXT" = "appx" ]; then EXT="Appx"; fi
                mv "$file" "./artifacts/${{ github.event.inputs.version }}.${EXT}"
              fi
            done
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Bedrock ${{ github.event.inputs.version }}
          files: ./artifacts/*
          draft: false
          prerelease: ${{ github.event.inputs.is_preview == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
